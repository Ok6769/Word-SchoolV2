<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dis Donc! - Karten</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container wide-mode" id="gameContainer">
    <h1>🃏 Paare finden</h1>
    <div class="subtitle">Verbinde die passenden deutschen und französischen Begriffe!</div>

    <div class="cards-grid" id="cardGrid"></div>

    <div id="winMessage" style="display:none; margin-bottom: 20px;">
        <h2>🎉 Отличный результат! Все пары найдены!</h2>
        <button class="restart-btn" onclick="generateCards()">Nochmal spielen 🔄</button>
    </div>

    <a class="restart-btn" style="background: #666; margin-top:0;" href="index.html">↩ Zum Hauptmenü</a>
</div>

<script src="questions.js"></script>
<script>
let firstSelected = null;
let secondSelected = null;
let matchesFound = 0;

// Автозапуск игры при открытии страницы
generateCards();

function generateCards() {
    const grid = document.getElementById("cardGrid");
    const winMsg = document.getElementById("winMessage");
    grid.innerHTML = "";
    winMsg.style.display = "none";
    matchesFound = 0;
    firstSelected = null;
    secondSelected = null;

    // 1. Получаем выбранный юнит и фильтруем слова
    const chosenUnit = localStorage.getItem('selectedUnit') || 'all';
    let activeQuestions = chosenUnit === 'all' ? [...questions] : questions.filter(q => q.unit == chosenUnit);

    // Защита: для построения матрицы 4х3 (из 6 пар) нужно как минимум 6 слов в юните!
    if (activeQuestions.length < 6) {
        grid.style.display = "block";
        grid.innerHTML = `
            <p style="color:#e74c3c; text-align:center; font-weight:bold; font-size:18px;">
                ⚠️ In diesem Unit gibt es zu wenige Wörter für dieses Spiel!
            </p>
            <p style="text-align:center; color:#555;">
                (Es werden mindestens 6 Wörter benötigt. Dieses Unit hat aktuell nur ${activeQuestions.length}).
            </p>
        `;
        return;
    } else {
        grid.style.display = "grid"; // возвращаем сетку, если всё ок
    }

    // 2. Перемешиваем и выбираем ровно 6 случайных пар
    activeQuestions.sort(() => Math.random() - 0.5);
    const selectedPairs = activeQuestions.slice(0, 6);

    // 3. Расскладываем пары на 12 одиночных карточек
    let cardItems = [];
    selectedPairs.forEach((pair, index) => {
        cardItems.push({ text: pair.de, pairId: index }); // Немецкое слово
        cardItems.push({ text: pair.fr, pairId: index }); // Французское слово
    });

    // Перемешиваем карточки между собой
    cardItems.sort(() => Math.random() - 0.5);

    // 4. Отрисовка карточек
    cardItems.forEach(item => {
        const cardElement = document.createElement("div");
        cardElement.className = "card";
        cardElement.textContent = item.text;
        cardElement.dataset.pairId = item.pairId;

        cardElement.onclick = () => {
            if (cardElement.classList.contains('correct') || cardElement === firstSelected) return;
            if (document.querySelectorAll('.card.wrong').length > 0) return; // блокировка клика во время анимации ошибки

            cardElement.classList.add('selected');

            if (!firstSelected) {
                firstSelected = cardElement;
            } else {
                secondSelected = cardElement;
                checkCardMatch();
            }
        };

        grid.appendChild(cardElement);
    });
}

function checkCardMatch() {
    if (firstSelected.dataset.pairId === secondSelected.dataset.pairId) {
        // Совпадение!
        firstSelected.classList.remove('selected');
        secondSelected.classList.remove('selected');
        firstSelected.classList.add('correct');
        secondSelected.classList.add('correct');
        
        matchesFound++;
        firstSelected = null;
        secondSelected = null;

        if (matchesFound === 6) {
            setTimeout(() => {
                document.getElementById("winMessage").style.display = "block";
            }, 500);
        }
    } else {
        // Ошибка
        firstSelected.classList.add('wrong');
        secondSelected.classList.add('wrong');

        setTimeout(() => {
            firstSelected.classList.remove('selected', 'wrong');
            secondSelected.classList.remove('selected', 'wrong');
            firstSelected = null;
            secondSelected = null;
        }, 600);
    }
}
</script>
</body>
</html>
