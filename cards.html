<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dis Donc! - Karten</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Настройка CSS переменных для тем карт */
        :root {
            --main-color: #ff8c1a;
            --main-hover: #e07b13;
        }
        body.theme-green {
            --main-color: #2ecc71;
            --main-hover: #27ae60;
        }
        /* Динамическое окрашивание выбранных карточек */
        .card.selected {
            border-color: var(--main-color) !important;
            color: var(--main-color) !important;
        }
        .restart-btn { background-color: var(--main-color) !important; }
        .restart-btn:hover { background-color: var(--main-hover) !important; }
    </style>
</head>
<body>

<div class="container wide-mode" id="gameContainer">
    <h1>🃏 Paare finden</h1>
    <div class="subtitle">Verbinde die passenden deutschen und französischen Begriffe!</div>

    <div class="cards-grid" id="cardGrid"></div>

    <div id="winMessage" style="display:none; margin-bottom: 20px;">
        <h2>🎉 Отличный результат! Все пары найдены!</h2>
        <button class="restart-btn" onclick="generateCards()">Nochmal spielen 🔄</button>
    </div>

    <a class="restart-btn" style="background: #666; margin-top:0;" href="index.html">↩ Zum Hauptmenü</a>
</div>

<script src="questions.js"></script>
<script>
let firstSelected = null;
let secondSelected = null;
let matchesFound = 0;

// Автозапуск игры при открытии страницы
generateCards();

function generateCards() {
    const grid = document.getElementById("cardGrid");
    const winMsg = document.getElementById("winMessage");
    grid.innerHTML = "";
    winMsg.style.display = "none";
    matchesFound = 0;
    firstSelected = null;
    secondSelected = null;

    // 1. Извлекаем выбранные книгу и юнит
    const chosenBook = localStorage.getItem('selectedBook') || '6';
    const chosenUnit = localStorage.getItem('selectedUnit') || 'all';

    // 2. Включаем зелёный дизайн, если выбрана 5-я книга
    if (chosenBook === '5') {
        document.body.className = 'theme-green';
    } else {
        document.body.className = '';
    }

    // 3. Фильтруем массив слов по книге и юниту
    let activeQuestions = questions.filter(q => q.book == chosenBook);
    if (chosenUnit !== 'all') {
        activeQuestions = activeQuestions.filter(q => q.unit == chosenUnit);
    }

    // Защита: для построения игрового поля нужно минимум 6 слов в выбранной вкладке
    if (activeQuestions.length < 6) {
        grid.style.display = "block";
        grid.innerHTML = `
            <p style="color:#e74c3c; text-align:center; font-weight:bold; font-size:18px;">
                ⚠️ Zu wenige Wörter in dieser Auswahl!
            </p>
            <p style="text-align:center; color:#555;">
                Für dieses Spiel werden mindestens 6 Wörter im Unit benötigt. (Aktuell: ${activeQuestions.length}).
            </p>
        `;
        return;
    } else {
        grid.style.display = "grid";
    }

    // 4. Вытаскиваем 6 случайных пар для раунда
    activeQuestions.sort(() => Math.random() - 0.5);
    const selectedPairs = activeQuestions.slice(0, 6);

    let cardItems = [];
    selectedPairs.forEach((pair, index) => {
        cardItems.push({ text: pair.de, pairId: index });
        cardItems.push({ text: pair.fr, pairId: index });
    });

    cardItems.sort(() => Math.random() - 0.5);

    // 5. Отрендерить карточки на экране
    cardItems.forEach(item => {
        const cardElement = document.createElement("div");
        cardElement.className = "card";
        cardElement.textContent = item.text;
        cardElement.dataset.pairId = item.pairId;

        cardElement.onclick = () => {
            if (cardElement.classList.contains('correct') || cardElement === firstSelected) return;
            if (document.querySelectorAll('.card.wrong').length > 0) return; 

            cardElement.classList.add('selected');

            if (!firstSelected) {
                firstSelected = cardElement;
            } else {
                secondSelected = cardElement;
                checkCardMatch();
            }
        };

        grid.appendChild(cardElement);
    });
}

function checkCardMatch() {
    if (firstSelected.dataset.pairId === secondSelected.dataset.pairId) {
        firstSelected.classList.remove('selected');
        secondSelected.classList.remove('selected');
        firstSelected.classList.add('correct');
        secondSelected.classList.add('correct');
        
        matchesFound++;
        firstSelected = null;
        secondSelected = null;

        if (matchesFound === 6) {
            setTimeout(() => {
                document.getElementById("winMessage").style.display = "block";
            }, 500);
        }
    } else {
        firstSelected.classList.add('wrong');
        secondSelected.classList.add('wrong');

        setTimeout(() => {
            firstSelected.classList.remove('selected', 'wrong');
            secondSelected.classList.remove('selected', 'wrong');
            firstSelected = null;
            secondSelected = null;
        }, 600);
    }
}
</script>
</body>
</html>
