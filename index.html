<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dis Donc! – Dashboard</title>
    <style>
        :root {
            --text-main: #1e293b;
            --main-color: #ff8c1a;
            --main-gradient: linear-gradient(135deg, #ff8c1a 0%, #ff5722 100%);
        }
        body.theme-green { --main-color: #2ecc71; --main-gradient: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%); }
        
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f8fafc; background-image: radial-gradient(rgba(148, 163, 184, 0.25) 1.5px, transparent 1.5px); background-size: 26px 26px; }
        
        .dashboard-container { width: 100%; max-width: 500px; background: #ffffff; padding: 40px; border-radius: 24px; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        .mode-card { display: block; text-decoration: none; text-align: left; padding: 20px; border: 1px solid #e2e8f0; border-radius: 16px; color: #1e293b; margin-bottom: 15px; transition: 0.2s; }
        .mode-card:hover { border-color: var(--main-color); background: #fffaf5; }
        .sidebar { position: fixed; top: 0; right: -350px; width: 350px; height: 100vh; background: #ffffff; border-left: 1px solid #e2e8f0; padding: 40px; box-sizing: border-box; transition: 0.4s; z-index: 999; }
        .sidebar.open { right: 0; }
        .select-box { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; margin-top: 8px; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <h1 id="welcomeHeader" style="margin: 0 0 5px 0; font-size: 32px;">Dis Donc! 6</h1>
        <p style="color: #64748b; margin-bottom: 30px;">Interaktiver Vokabeltrainer</p>
        
        <a href="quiz.html" class="mode-card">
            <div style="font-weight: 800;">Klassischer Test</div>
            <div style="font-size: 13px; color: #64748b;">3-Stufen-System: Erkennen, Übersetzen, Schreiben.</div>
        </a>
        
        <a href="cards.html" class="mode-card">
            <div style="font-weight: 800;">Paare finden</div>
            <div style="font-size: 13px; color: #64748b;">Verbinde Vokabelpaare spielerisch.</div>
        </a>
    </div>

    <div class="sidebar" id="sidebarMenu">
        <div style="font-size: 20px; font-weight: 800; margin-bottom: 20px;">Einstellungen</div>
        <div class="sidebar-section">
            <div style="font-size: 12px; font-weight: 800; color: #94a3b8;">LEHRBUCH</div>
            <select class="select-box" id="bookSelect" onchange="changeBook()"><option value="5">Dis Donc! 5</option><option value="6">Dis Donc! 6</option></select>
        </div>
        <div class="sidebar-section" style="margin-top: 20px;">
            <div style="font-size: 12px; font-weight: 800; color: #94a3b8;">UNIT</div>
            <select class="select-box" id="unitSelect"><option value="all">Alle</option><option value="1">Unit 1</option><option value="2">Unit 2</option></select>
        </div>
    </div>

<script>
    function changeBook() { /* логика смены тем */ }
</script>
</body>
</html>
