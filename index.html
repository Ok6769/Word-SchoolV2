<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dis Donc! – Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Стили для профессиональной двухпанельной разметки */
        body {
            display: flex;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: #f5f7fa;
        }

        /* Боковая панель (Sidebar) */
        .sidebar {
            width: 280px;
            background: #width;
            background-color: #ffffff;
            border-right: 2px solid #e4e8ee;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.03);
        }

        .sidebar-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8a94a6;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .select-box {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            border-radius: 10px;
            border: 2px solid #dcdfe6;
            outline: none;
            cursor: pointer;
            background-color: #fff;
            transition: all 0.3s;
        }
        
        /* Основной контент справа */
        .main-content {
            flex: 1;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dashboard-container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }

        /* Переключатель тем в зависимости от выбранной книги */
        :root {
            --main-color: #ff8c1a; /* Цвет по умолчанию (Dis Donc 6) */
            --main-hover: #e07b13;
        }

        body.theme-green {
            --main-color: #2ecc71; /* Зелёный цвет для Dis Donc 5 */
            --main-hover: #27ae60;
        }

        /* Динамически меняем цвета элементов управления */
        .select-box:focus { border-color: var(--main-color); }
        h1 { color: #2c3e50; margin-top: 0; }
        .mode-btn {
            border: 2px solid var(--main-color) !important;
        }
        .mode-btn:hover {
            background: var(--main-color) !important;
            color: white !important;
        }
    </style>
</head>
<body class="theme-orange">

    <div class="sidebar">
        <div>
            <div class="sidebar-title">📖 ЛЕКЦИЯ</div>
            <select class="select-box" id="bookSelect" onchange="changeBook()">
                <option value="5">Dis Donc! 5 (Grün)</option>
                <option value="6">Dis Donc! 6 (Orange)</option>
            </select>
        </div>

        <div>
            <div class="sidebar-title">🔖 ЮНИТ</div>
            <select class="select-box" id="unitSelect" onchange="saveSelection()">
                <option value="all">Alle Units (Все слова)</option>
                <option value="1">Unit 1</option>
                <option value="2">Unit 2</option>
                <option value="3">Unit 3</option>
                <option value="4">Unit 4</option>
                <option value="5">Unit 5</option>
                <option value="6">Unit 6</option>
            </select>
        </div>
    </div>

    <div class="main-content">
        <div class="dashboard-container">
            <h1 id="welcomeHeader">🇫🇷 Dis Donc! 6</h1>
            <p style="color: #7f8c8d; margin-bottom: 30px;">Wähle links dein Buch und Unit, danach starte das Training!</p>
            
            <div class="mode-selection" style="display: flex; flex-direction: column; gap: 15px;">
                <a href="quiz.html" class="mode-btn" style="text-decoration: none; text-align: left; display: block; padding: 20px; border-radius: 15px; color: #333; font-weight: bold; transition: 0.2s;">
                    📝 Klassischer Test
                    <span style="display: block; font-weight: normal; font-size: 13px; color: #7f8c8d; margin-top: 5px;">Drei Stufen: MCQ, Deutsch- und Französisch-Eingabe.</span>
                </a>
                
                <a href="cards.html" class="mode-btn" style="text-decoration: none; text-align: left; display: block; padding: 20px; border-radius: 15px; color: #333; font-weight: bold; transition: 0.2s;">
                    🃏 Karten-Spiel (Quizlet-Style)
                    <span style="display: block; font-weight: normal; font-size: 13px; color: #7f8c8d; margin-top: 5px;">Verbinde französische und deutsche Paare.</span>
                </a>
            </div>
        </div>
    </div>

<script>
    // Инициализация при первой загрузке сайта
    let currentBook = localStorage.getItem('selectedBook') || '6';
    let currentUnit = localStorage.getItem('selectedUnit') || 'all';

    document.getElementById('bookSelect').value = currentBook;
    document.getElementById('unitSelect').value = currentUnit;
    
    applyTheme(currentBook);

    function changeBook() {
        currentBook = document.getElementById('bookSelect').value;
        localStorage.setItem('selectedBook', currentBook);
        applyTheme(currentBook);
    }

    function saveSelection() {
        currentUnit = document.getElementById('unitSelect').value;
        localStorage.setItem('selectedUnit', currentUnit);
    }

    function applyTheme(book) {
        if(book === '5') {
            document.body.className = 'theme-green';
            document.getElementById('welcomeHeader').textContent = '🇫🇷 Dis Donc! 5';
        } else {
            document.body.className = 'theme-orange';
            document.getElementById('welcomeHeader').textContent = '🇫🇷 Dis Donc! 6';
        }
    }
</script>
</body>
</html>
