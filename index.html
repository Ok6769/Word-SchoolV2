<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dis Donc! – Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            /* Чистый, благородный фон без лишней пестроты */
            background-color: #f8fafc;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(241, 245, 249, 1) 0%, transparent 80%),
                radial-gradient(circle at 80% 80%, rgba(226, 232, 240, 0.5) 0%, transparent 80%);
        }

        body.theme-green {
            background-color: #f4fbf7;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(240, 253, 244, 1) 0%, transparent 80%),
                radial-gradient(circle at 80% 80%, rgba(220, 252, 231, 0.4) 0%, transparent 80%);
        }

        /* Кнопка вызова меню (Минималистичные линии вместо значков) */
        .menu-toggle {
            position: fixed;
            top: 25px;
            right: 25px;
            width: 50px;
            height: 50px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            z-index: 1000;
            box-shadow: var(--shadow-sm);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-toggle:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
            border-color: var(--main-color);
        }

        .menu-toggle span {
            display: block;
            width: 20px;
            height: 2px;
            background-color: var(--text-main);
            border-radius: 1px;
            transition: all 0.25s ease;
        }

        .menu-toggle.active span:nth-child(1) {
            transform: translateY(8px) rotate(45deg);
        }
        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }
        .menu-toggle.active span:nth-child(3) {
            transform: translateY(-4px) rotate(-45deg);
        }

        /* Выезжающая боковая панель с градиентным бордером */
        .sidebar {
            position: fixed;
            top: 0;
            right: -350px;
            width: 350px;
            height: 100vh;
            background-color: #ffffff;
            border-left: 1px solid #edf2f7;
            padding: 100px 35px 40px 35px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: -15px 0 30px rgba(0,0,0,0.02);
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 999;
        }

        .sidebar.open {
            right: 0;
        }

        .sidebar-header {
            font-size: 22px;
            font-weight: 850;
            letter-spacing: -0.5px;
            color: #1a202c;
            padding-bottom: 15px;
            border-bottom: 2px solid #f1f5f9;
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 30px;
        }

        .sidebar-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #94a3b8;
            font-weight: 800;
        }

        .select-box {
            width: 100%;
            padding: 16px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 14px;
            border: 1px solid #e2e8f0;
            outline: none;
            cursor: pointer;
            background-color: #f8fafc;
            transition: all 0.2s ease;
            color: #334155;
            appearance: none; /* Убираем дефолтную стрелку браузера */
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 16px;
        }
        
        .select-box:focus { 
            border-color: var(--main-color); 
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(255, 140, 26, 0.1);
        }
        body.theme-green .select-box:focus {
            box-shadow: 0 0 0 4px rgba(46, 204, 113, 0.1);
        }

        /* Информационный подвал меню */
        .sidebar-footer {
            border-top: 1px solid #f1f5f9;
            padding-top: 25px;
            font-size: 13px;
            line-height: 1.6;
            color: #64748b;
        }

        .dev-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #fff1f2;
            color: #e11d48
