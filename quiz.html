<!DOCTYPE html>
<html lang="de">
<head>
    <style>
        body { font-family: sans-serif; background: #f8fafc; padding: 20px; display: flex; justify-content: center; }
        /* Основной контейнер теперь ниже и компактнее для ноутбуков */
        .container { background: #ffffff; padding: 25px; border-radius: 20px; border: 1px solid #e2e8f0; width: 100%; max-width: 450px; }
        
        /* Кнопка "Zum Hauptmenü" */
        .back-btn { 
            display: inline-flex; align-items: center; gap: 8px; 
            padding: 8px 16px; background: #f1f5f9; border: 1px solid #e2e8f0; 
            border-radius: 8px; color: #64748b; text-decoration: none; font-size: 14px; font-weight: 600;
        }
        
        #word { font-size: 24px; font-weight: 800; margin: 20px 0; }
        .answer-btn { width: 100%; padding: 14px; margin-bottom: 8px; border: 1px solid #e2e8f0; border-radius: 12px; background: #fff; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2 style="margin: 0; font-size: 18px;">Klassischer Test</h2>
        <a href="index.html" class="back-btn">← Zum Hauptmenü</a>
    </div>
    
    <div id="word">das Kino</div>
    <div id="answers">
        <button class="answer-btn">le courage</button>
        <button class="answer-btn">le jardin</button>
        <button class="answer-btn">le cinéma</button>
    </div>
</div>

</body>
</html>
