<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dis Donc! - Quiz</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Локальные переменные темы для плавного изменения интерфейса */
        :root {
            --main-color: #ff8c1a;
            --main-hover: #e07b13;
        }
        body.theme-green {
            --main-color: #2ecc71;
            --main-hover: #27ae60;
        }
        /* Динамическое окрашивание элементов квиза */
        .progress-fill { background-color: var(--main-color) !important; }
        .restart-btn { background-color: var(--main-color) !important; }
        .restart-btn:hover { background-color: var(--main-hover) !important; }
        .input-box:focus { border-color: var(--main-color) !important; }
        .char-btn:hover { background-color: var(--main-color) !important; color: white; }
    </style>
</head>
<body>

<div class="container" id="gameContainer">
    <h1>🇫🇷 Dis Donc!</h1>
    <div class="subtitle" id="stageTitle">Teil 1: Multiple Choice</div>
    <div class="progress-text" id="progressText">Frage 1 von 20</div>
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div id="word"></div>
    <div id="answers"></div>
    <div id="result"></div>
    <div class="score-box" style="display:flex; justify-content:space-between; align-items:center;">
        <span>Punkte: <span id="score">0</span></span>
        <a class="restart-btn" style="font-size:14px; padding:8px 15px; margin:0;" href="index.html">↩ Menü</a>
    </div>
</div>

<script src="questions.js"></script>
<script>
let current = 0;
let score = 0;
let mode = 1; 

// 1. Извлекаем выбранную книгу и юнит
const chosenBook = localStorage.getItem('selectedBook') || '6';
const chosenUnit = localStorage.getItem('selectedUnit') || 'all';

// 2. Динамически красим интерфейс квиза в нужный цвет при запуске
if (chosenBook === '5') {
    document.body.className = 'theme-green';
}

// 3. Двухуровневая фильтрация массива слов
let activeQuestions = questions.filter(q => q.book == chosenBook);

if (chosenUnit !== 'all') {
    activeQuestions = activeQuestions.filter(q => q.unit == chosenUnit);
}

// Защитный сброс: если вдруг в юните пусто, загружаем всю книгу
if (activeQuestions.length === 0) {
    activeQuestions = questions.filter(q => q.book == chosenBook);
}

const MAX = activeQuestions.length > 20 ? 20 : activeQuestions.length;
activeQuestions.sort(() => Math.random() - 0.5);

// Старт игры
loadQuestion();

function updateProgress(){
    const pf = document.getElementById("progressFill");
    const pt = document.getElementById("progressText");
    if(pf && pt) {
        pf.style.width = (current / MAX) * 100 + "%";
        pt.textContent = `Frage ${current + 1} von ${MAX}`;
    }
}

function loadQuestion(){
    updateProgress();
    document.getElementById("result").textContent = "";

    const de = activeQuestions[current].de;
    const fr = activeQuestions[current].fr;
    
    const word = (mode === 1 || mode === 3) ? de : fr;
    const correct = (mode === 1 || mode === 3) ? fr : de;

    document.getElementById("word").textContent = word;
    const answers = document.getElementById("answers");
    answers.innerHTML = "";

    if(mode === 1){
        let options = [correct];
        while(options.length < 4 && options.length < activeQuestions.length){
            let r = activeQuestions[Math.floor(Math.random() * activeQuestions.length)].fr;
            if(!options.includes(r)) options.push(r);
        }
        options.sort(() => Math.random() - 0.5);

        options.forEach(opt => {
            const btn = document.createElement("button");
            btn.className = "answer-btn";
            btn.textContent = opt;
            btn.onclick = () => {
                document.querySelectorAll(".answer-btn").forEach(b => b.disabled = true);
                if(opt === correct){
                    btn.classList.add("correct");
                    document.getElementById("result").textContent = "✅ Richtig!";
                    score++;
                } else {
                    btn.classList.add("wrong");
                    document.querySelectorAll(".answer-btn").forEach(b => {
                        if(b.textContent === correct) b.classList.add("correct");
                    });
                    document.getElementById("result").textContent = "❌ Falsch!";
                }
                document.getElementById("score").textContent = score;
                current++;
                setTimeout(()=>{
                    if(current < MAX) loadQuestion();
                    else showContinue(2); 
                }, 1200);
            };
            answers.appendChild(btn);
        });
    }
    else {
        const input = document.createElement("input");
        input.className = "input-box";
        input.placeholder = mode === 2 ? "Auf Deutsch schreiben..." : "Écrire en français...";

        const btn = document.createElement("button");
        btn.className = "answer-btn";
        btn.textContent = "Prüfen";

        function clean(text, currentMode){
            if (currentMode === 2) {
                let cleared = text.replace(/\b(der|die|das)\b/gi, "").replace(/\s+/g," ").trim();
                if(cleared.length > 0) {
                    cleared = cleared.charAt(0).toUpperCase() + cleared.slice(1);
                }
                return cleared;
            } else {
                return text.toLowerCase().trim();
            }
        }

        function check(){
            const user = clean(input.value, mode);
            const correctClean = clean(correct, mode);

            document.querySelectorAll(".answer-btn").forEach(b => b.disabled = true);

            if(user === correctClean){
                input.style.border = "2px solid #2ecc71";
                input.style.boxShadow = "0 0 10px rgba(46, 204, 113, 0.3)";
                document.getElementById("result").textContent = "✅ Richtig!";
                score++;
            } else {
                input.style.border = "2px solid #e74c3c";
                input.style.boxShadow = "0 0 10px rgba(231, 76, 60, 0.3)";
                document.getElementById("result").textContent = "❌ Falsch! Richtig: " + correct;
            }

            document.getElementById("score").textContent = score;
            current++;

            setTimeout(()=>{
                if(current < MAX) loadQuestion();
                else {
                    if(mode === 2) showContinue(3); 
                    else finishQuiz(); 
                }
            }, 1200);
        }

        btn.onclick = check;
        input.addEventListener("keydown", e => { if(e.key === "Enter") check(); });

        if(mode === 3) {
            const keyboardContainer = document.createElement("div");
            keyboardContainer.className = "french-keyboard";
            const frenchChars = ["é", "è", "à", "ç", "œ", "ù", "â", "ê", "î", "ô", "û", "ë", "ï"];
            
            frenchChars.forEach(char => {
                const charBtn = document.createElement("button");
                charBtn.className = "char-btn";
                charBtn.type = "button";
                charBtn.textContent = char;
                
                charBtn.onclick = (e) => {
                    e.preventDefault();
                    const startPos = input.selectionStart;
                    const endPos = input.selectionEnd;
                    const text = input.value;
                    
                    input.value = text.substring(0, startPos) + char + text.substring(endPos);
                    input.selectionStart = input.selectionEnd = startPos + 1;
                    input.focus();
                };
                keyboardContainer.appendChild(charBtn);
            });
            answers.appendChild(keyboardContainer);
        }

        answers.appendChild(input);
        answers.appendChild(btn);
        input.focus();
    }
}

function showContinue(nextMode){
    let title = "";
    let subtitle = "";
    let btnClick = "";

    if(nextMode === 2) {
        title = "🔥 Teil 1 fertig!";
        subtitle = "Jetzt kommt Teil 2 (Eingabe auf Deutsch)";
        btnClick = "startStage2()";
    } else if(nextMode === 3) {
        title = "🔥 Teil 2 fertig!";
        subtitle = "Jetzt kommt Teil 3 (Eingabe auf Französisch)";
        btnClick = "startStage3()";
    }

    document.getElementById("gameContainer").innerHTML = `
        <h1>${title}</h1>
        <p>${subtitle}</p>
        <button class="restart-btn" onclick="${btnClick}">Weiter ▶</button>
    `;
}

function startStage2(){
    current = 0; mode = 2;
    setupStageHeader("Teil 2: Eingabe auf Deutsch");
    loadQuestion();
}

function startStage3(){
    current = 0; mode = 3;
    setupStageHeader("Teil 3: Eingabe auf Französisch");
    loadQuestion();
}

function setupStageHeader(titleString) {
    document.getElementById("gameContainer").innerHTML = `
        <h1>🇫🇷 Dis Donc!</h1>
        <div class="subtitle">${titleString}</div>
        <div class="progress-text" id="progressText"></div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div id="word"></div>
        <div id="answers"></div>
        <div id="result"></div>
        <div class="score-box" style="display:flex; justify-content:space-between; align-items:center;">
            <span>Punkte: <span id="score">${score}</span></span>
            <a class="restart-btn" style="font-size:14px; padding:8px 15px; margin:0;" href="index.html">↩ Menü</a>
        </div>
    `;
}

function finishQuiz(){
    const totalPossiblePoints = MAX * 3;
    const percent = Math.round((score / totalPossiblePoints) * 100);
    let msg = percent >= 90 ? "🏆 Fantastisch!" : percent >= 70 ? "🥈 Sehr gut!" : percent >= 50 ? "👍 Gut!" : "📚 Weiter üben!";

    document.getElementById("gameContainer").innerHTML = `
        <h1>🎉 Fertig!</h1>
        <h2>${msg}</h2>
        <h1>${score}/${totalPossiblePoints}</h1>
        <p>${percent}% richtig</p>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button class="restart-btn" onclick="location.reload()">Neu starten 🔄</button>
            <a class="restart-btn" style="background:#666;" href="index.html">Hauptmenü 🏠</a>
        </div>
    `;
}
</script>
</body>
</html>
