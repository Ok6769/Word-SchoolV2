<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dis Donc! - Quiz</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Локальные стили для восстановления всех игровых элементов в новом дизайне */
        #word {
            font-size: 32px;
            font-weight: 800;
            margin: 30px 0;
            color: var(--text-main);
        }
        #result {
            font-size: 18px;
            font-weight: 750;
            margin: 20px 0;
            min-height: 28px;
        }
        .score-box {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #edf2f7;
            font-weight: 700;
            color: var(--text-main);
        }
        /* Стилизация инпута в стиле нового дизайна */
        .input-container {
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="container" id="gameContainer">
    <h1>🇫🇷 Dis Donc!</h1>
    <div class="subtitle" id="stageTitle">Teil 1: Multiple Choice</div>
    
    <div class="progress-text" id="progressText">Frage 1 von 20</div>
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    
    <div id="word"></div>
    <div id="answers"></div>
    <div id="result"></div>
    
    <div class="score-box" style="display:flex; justify-content:space-between; align-items:center;">
        <span>Punkte: <span id="score">0</span></span>
        <a class="restart-btn" style="padding: 10px 20px; font-size: 14px;" href="index.html">↩ Menü</a>
    </div>
</div>

<script src="questions.js"></script>
<script>
let current = 0;
let score = 0;
let mode = 1; // 1 = MCQ, 2 = Deutsch, 3 = Französisch

// 1. Извлекаем настройки из localStorage
const chosenBook = localStorage.getItem('selectedBook') || '6';
const chosenUnit = localStorage.getItem('selectedUnit') || 'all';

// 2. Включаем нужную тему оформления
if (chosenBook === '5') {
    document.body.classList.add('theme-green');
}

// 3. Фильтруем базу слов по книге и юниту
let activeQuestions = questions.filter(q => q.book == chosenBook);
if (chosenUnit !== 'all') {
    activeQuestions = activeQuestions.filter(q => q.unit == chosenUnit);
}

// Защитный сброс
if (activeQuestions.length === 0) {
    activeQuestions = questions.filter(q => q.book == chosenBook);
}

// Перемешиваем и ограничиваем раунд до 20 слов
const MAX = activeQuestions.length > 20 ? 20 : activeQuestions.length;
activeQuestions.sort(() => Math.random() - 0.5);

// Запуск первой карточки
loadQuestion();

function updateProgress(){
    const pf = document.getElementById("progressFill");
    const pt = document.getElementById("progressText");
    if(pf && pt) {
        pf.style.width = (current / MAX) * 100 + "%";
        pt.textContent = `Frage ${current + 1} von ${MAX}`;
    }
}

function loadQuestion(){
    updateProgress();
    document.getElementById("result").textContent = "";

    const de = activeQuestions[current].de;
    const fr = activeQuestions[current].fr;
    
    // В зависимости от режима определяем, что показываем, а что спрашиваем
    const wordToShow = (mode === 1 || mode === 3) ? de : fr;
    const correctAnswers = (mode === 1 || mode === 3) ? fr : de;

    document.getElementById("word").textContent = wordToShow;
    const answersContainer = document.getElementById("answers");
    answersContainer.innerHTML = "";

    // === РЕЖИМ 1: MULTIPLE CHOICE ===
    if(mode === 1){
        let options = [correctAnswers];
        while(options.length < 4 && options.length < activeQuestions.length){
            let randWord = activeQuestions[Math.floor(Math.random() * activeQuestions.length)].fr;
            if(!options.includes(randWord)) options.push(randWord);
        }
        options.sort(() => Math.random() - 0.5);

        options.forEach(opt => {
            const btn = document.createElement("button");
            btn.className = "answer-btn";
            btn.textContent = opt;
            btn.onclick = () => {
                document.querySelectorAll(".answer-btn").forEach(b => b.disabled = true);
                if(opt === correctAnswers){
                    btn.classList.add("correct");
                    document.getElementById("result").innerHTML = "<span style='color: #2ecc71;'>✅ Richtig!</span>";
                    score++;
                } else {
                    btn.classList.add("wrong");
                    document.querySelectorAll(".answer-btn").forEach(b => {
                        if(b.textContent === correctAnswers) b.classList.add("correct");
                    });
                    document.getElementById("result").innerHTML = "<span style='color: #e74c3c;'>❌ Falsch!</span>";
                }
                document.getElementById("score").textContent = score;
                current++;
                setTimeout(()=>{
                    if(current < MAX) loadQuestion();
                    else showStageTransition(2); 
                }, 1200);
            };
            answersContainer.appendChild(btn);
        });
    }
    // === РЕЖИМЫ 2 и 3: РУЧНОЙ ВВОД ТЕКСТА ===
    else {
        const inputContainer = document.createElement("div");
        inputContainer.className = "input-container";

        const input = document.createElement("input");
        input.className = "input-box";
        input.type = "text";
        input.placeholder = mode === 2 ? "Auf Deutsch schreiben..." : "Écrire en français...";
        inputContainer.appendChild(input);

        // Если это режим 3 (пишем по-французски) — добавляем панель символов
        if(mode === 3) {
            const keyboardContainer = document.createElement("div");
            keyboardContainer.className = "french-keyboard";
            const frenchChars = ["é", "è", "à", "ç", "œ", "ù", "â", "ê", "î", "ô", "û", "ë", "ï"];
            
            frenchChars.forEach(char => {
                const charBtn = document.createElement("button");
                charBtn.className = "char-btn";
                charBtn.type = "button";
                charBtn.textContent = char;
                
                charBtn.onclick = (e) => {
                    e.preventDefault();
                    const start = input.selectionStart;
                    const end = input.selectionEnd;
                    input.value = input.value.substring(0, start) + char + input.value.substring(end);
                    input.selectionStart = input.selectionEnd = start + 1;
                    input.focus();
                };
                keyboardContainer.appendChild(charBtn);
            });
            answersContainer.appendChild(keyboardContainer);
        }

        const submitBtn = document.createElement("button");
        submitBtn.className = "restart-btn";
        submitBtn.style.width = "100%";
        submitBtn.textContent = "Prüfen";

        // Функция нормализации текста (умная проверка без учета артиклей и регистра)
        function cleanText(text, currentMode){
            if (currentMode === 2) {
                let cleared = text.replace(/\b(der|die|das)\b/gi, "").replace(/\s+/g," ").trim();
                if(cleared.length > 0) cleared = cleared.charAt(0).toUpperCase() + cleared.slice(1);
                return cleared;
            } else {
                return text.toLowerCase().trim();
            }
        }

        function checkInputResult(){
            const userAns = cleanText(input.value, mode);
            const correctAns = cleanText(correctAnswers, mode);

            submitBtn.disabled = true;
            input.disabled = true;

            if(userAns === correctAns){
                input.classList.add("correct");
                document.getElementById("result").innerHTML = "<span style='color: #2ecc71;'>✅ Richtig!</span>";
                score++;
            } else {
                input.classList.add("wrong");
                document.getElementById("result").innerHTML = `<span style='color: #e74c3c;'>❌ Falsch! Richtig: <b>${correctAnswers}</b></span>`;
            }

            document.getElementById("score").textContent = score;
            current++;

            setTimeout(()=>{
                if(current < MAX) loadQuestion();
                else {
                    if(mode === 2) showStageTransition(3); 
                    else showFinalResults(); 
                }
            }, 2000);
        }

        submitBtn.onclick = checkInputResult;
        input.addEventListener("keydown", e => { if(e.key === "Enter") checkInputResult(); });

        answersContainer.appendChild(inputContainer);
        answersContainer.appendChild(submitBtn);
        input.focus();
    }
}

// Экран перехода между уровнями сложности
function showStageTransition(nextMode){
    let title = "";
    let subtitle = "";
    let handlerName = "";

    if(nextMode === 2) {
        title = "🔥 Teil 1 geschafft!";
        subtitle = "Bereit für Teil 2? (Eingabe auf Deutsch)";
        handlerName = "startStage2()";
    } else if(nextMode === 3) {
        title = "🚀 Teil 2 geschafft!";
        subtitle = "Bereit für das Finale? (Eingabe auf Französisch)";
        handlerName = "startStage3()";
    }

    document.getElementById("gameContainer").innerHTML = `
        <h1>${title}</h1>
        <p class="subtitle">${subtitle}</p>
        <button class="restart-btn" onclick="${handlerName}">Weitergehen ▶</button>
    `;
}

function startStage2(){
    current = 0; mode = 2;
    rebuildQuizLayout("Teil 2: Deutsch-Eingabe");
    loadQuestion();
}

function startStage3(){
    current = 0; mode = 3;
    rebuildQuizLayout("Teil 3: Französisch-Schreibtest");
    loadQuestion();
}

function rebuildQuizLayout(titleText) {
    document.getElementById("gameContainer").innerHTML = `
        <h1>🇫🇷 Dis Donc!</h1>
        <div class="subtitle" id="stageTitle">${titleText}</div>
        <div class="progress-text" id="progressText"></div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div id="word"></div>
        <div id="answers"></div>
        <div id="result"></div>
        <div class="score-box" style="display:flex; justify-content:space-between; align-items:center;">
            <span>Punkte: <span id="score">${score}</span></span>
            <a class="restart-btn" style="padding: 10px 20px; font-size: 14px;" href="index.html">↩ Menü</a>
        </div>
    `;
}

// Финальные результаты игры
function showFinalResults(){
    const totalPoints = MAX * 3;
    const percent = Math.round((score / totalPoints) * 100);
    let feedback = percent >= 90 ? "🏆 Absoluter Experte!" : percent >= 70 ? "🥈 Großartige Leistung!" : percent >= 50 ? "👍 Gut gemacht!" : "📚 Übung macht den Meister!";

    document.getElementById("gameContainer").innerHTML = `
        <h1>🎉 Training beendet!</h1>
        <h2 style="color: var(--text-main); margin-bottom:10px;">${feedback}</h2>
        <div style="font-size: 48px; font-weight: 900; background: var(--main-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 20px 0;">
            ${score} / ${totalPoints}
        </div>
        <p class="subtitle">${percent}% aller Antworten waren korrekt.</p>
        <div style="display:flex; gap:15px; justify-content:center; margin-top: 30px;">
            <button class="restart-btn" onclick="location.reload()">Nochmal 🔄</button>
            <a class="restart-btn" style="background: linear-gradient(135deg, #718096 0%, #4a5568 100%);" href="index.html">Hauptmenü 🏠</a>
        </div>
    `;
}
</script>
</body>
</html>
